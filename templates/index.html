<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel — SOS Rede Fácil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard-body">

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>🚀 SOS Rede</h2>
        <p class="user">Olá, {{ usuario }}</p>

        <nav>
            <a href="/ping">🌐 Ping</a>
            <a href="/ip">📍 Meu IP</a>
            <a href="/velocidade">⚡ Velocidade</a>
            <a href="/scanner">🔎 Scanner</a>
            <a href="/traceroute">🛰 Traceroute</a>
            <a href="/logout" class="logout">🚪 Sair</a>
        </nav>
    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

        <h1>📊 Dashboard</h1>

        <div class="cards">

            <a href="/ping" class="card">
                <h3>🌐 Monitoramento</h3>
                <p>Teste disponibilidade de hosts.</p>
            </a>

            <a href="/velocidade" class="card">
                <h3>⚡ Performance</h3>
                <p>Verifique velocidade e latência.</p>
            </a>

            <a href="/scanner" class="card">
                <h3>🔐 Segurança</h3>
                <p>Escaneie status da rede.</p>
            </a>

        </div>

    </main>

</div>

</body>
</html>
